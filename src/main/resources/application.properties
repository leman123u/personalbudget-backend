spring.application.name=personalbudget


server.port=${PORT:8080}
server.address=0.0.0.0
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false  
spring.security.user.name=admin
spring.security.user.password=admin
# Removed SNAKE_CASE naming strategy - using field names as-is
# If you need to convert between camelCase and snake_case, use @JsonProperty annotations
# spring.jackson.property-naming-strategy=SNAKE_CASE
spring.datasource.hikari.pool-name=app-pool
spring.datasource.hikari.maximum-pool-size=10    
spring.datasource.hikari.minimum-idle=2          
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000   
spring.datasource.hikari.max-lifetime=1800000
# ================= EMAIL CONFIG =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=${MAIL_USERNAME:leman.memmedli31378@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# ===== OPENAI =====
openai.api.key=${OPENAI_API_KEY}














